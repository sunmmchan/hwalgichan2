    <button id="panel-close" type="button" aria-label="패널 닫기">×</button>
  </div>
  <div id="panel-content">
    <div class="panel-empty">선택한 장소의 사진, 주소, 거리와 지도 링크가 이곳에 표시됩니다.</div>
  </div>

<script>
(function() {
  let miniMap = null;
  let miniBounds = null;
  let miniSelected = null;

  function initMiniMap() {
    const mainMap = map_7742d26e673cfcef89b64b6c3107503a;
    if (!mainMap || miniMap) return;
    miniMap = L.map('mini-map', {
      zoomControl:false, attributionControl:false, dragging:false, scrollWheelZoom:false,
      doubleClickZoom:false, boxZoom:false, keyboard:false, touchZoom:false
    });
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(miniMap);
    miniMap.setView(mainMap.getCenter(), Math.max(mainMap.getZoom()-4, 7));
    miniBounds = L.rectangle(mainMap.getBounds(), {color:'#2563eb', weight:2, fillOpacity:.08, interactive:false}).addTo(miniMap);
    function syncMini() {
      const z = Math.max(mainMap.getZoom()-4, 7);
      miniMap.setView(mainMap.getCenter(), z, {animate:false});
      miniBounds.setBounds(mainMap.getBounds());
    }
    mainMap.on('move zoom resize', syncMini);
    setTimeout(function(){ miniMap.invalidateSize(); syncMini(); }, 300);
  }

  function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function cleanText(el) { return (el ? el.textContent : '').replace(/\s+/g,' ').trim(); }
  function showPlace(marker) {
    const panel = document.getElementById('panel-content');
    const ll = marker.getLatLng();
    if (miniMap) {
      if (miniSelected) miniMap.removeLayer(miniSelected);
      miniSelected = L.circleMarker(ll, {radius:6, color:'#e11d48', weight:3, fillColor:'#fff', fillOpacity:1, interactive:false}).addTo(miniMap);
    }
    const popupNode = marker.getPopup && marker.getPopup() ? marker.getPopup().getContent() : null;
    const wrap = document.createElement('div');
    if (typeof popupNode === 'string') wrap.innerHTML = popupNode;
    else if (popupNode) wrap.appendChild(popupNode.cloneNode(true));
    const raw = cleanText(wrap);
    const bolds = wrap.querySelectorAll('b');
    const title = bolds.length ? cleanText(bolds[0]) : ((marker.getTooltip && marker.getTooltip()) ? cleanText(marker.getTooltip().getContent()) : '선택한 장소');
    const img = wrap.querySelector('img');
    const imageSrc = img ? img.src : '';
    const isNail = /네일|뷰티|헤어|nail/i.test(title + ' ' + raw) && !/아파트|푸르지오|자이|아이파크|하늘채|에스클래스/i.test(title);
    const distanceMatch = raw.match(/(?:직선거리|거리)[:\s]*([0-9,]+\s*m)/i);
    const addressMatch = raw.match(/(경상북도\s+구미시[^\n]*?)(?=가장 가까운|직선거리|거리|지도에서|카카오|네이버|$)/);
    const address = addressMatch ? addressMatch[1].trim() : raw.replace(title,'').split(/가장 가까운|직선거리|거리/)[0].trim();
    const kakao = 'https://map.kakao.com/link/to/' + encodeURIComponent(title) + ',' + ll.lat + ',' + ll.lng;
    const naver = 'https://map.naver.com/p/search/' + encodeURIComponent(title + ' 구미');
    const google = 'https://www.google.com/maps/dir/?api=1&destination=' + ll.lat + ',' + ll.lng;
    const handPhotos = [
      'https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=900&q=85',
      'https://images.unsplash.com/photo-1610992015732-2449b76344bc?auto=format&fit=crop&w=900&q=85',
      'https://images.unsplash.com/photo-1632345031435-8727f6897d53?auto=format&fit=crop&w=900&q=85',
      'https://images.unsplash.com/photo-1607779097040-26e80aa78e66?auto=format&fit=crop&w=900&q=85',
      'https://images.unsplash.com/photo-1599948128020-9a44505b0d1b?auto=format&fit=crop&w=900&q=85',
      'https://images.unsplash.com/photo-1612887390768-f1e9e5e0a4f0?auto=format&fit=crop&w=900&q=85',
      'https://images.unsplash.com/photo-1600948836101-f9ffda59d250?auto=format&fit=crop&w=900&q=85',
      'https://images.unsplash.com/photo-1583846783214-7229a91b20ed?auto=format&fit=crop&w=900&q=85',
      'https://images.unsplash.com/photo-1519014816548-bf5fe059798b?auto=format&fit=crop&w=900&q=85',
      'https://images.unsplash.com/photo-1571290274554-6a2eaa771e5f?auto=format&fit=crop&w=900&q=85'
    ];
    let seed = 0; for (const ch of title) seed = (seed + ch.charCodeAt(0)) % handPhotos.length;
    const gallery = isNail ? [imageSrc || handPhotos[seed], handPhotos[(seed+3)%10], handPhotos[(seed+6)%10]] : [];
    panel.innerHTML = `
      <span class="place-badge ${isNail ? 'nail-badge' : 'apt-badge'}">${isNail ? '네일숍' : '아파트'}</span>
      <h3 class="place-title">${esc(title)}</h3>
      ${isNail ? `<div class="photo-gallery"><img id="gallery-main" class="gallery-main" src="${esc(gallery[0])}" alt="${esc(title)} 손 네일 대표 이미지"><div class="gallery-side">${gallery.map((u,i)=>`<img class="gallery-thumb ${i===0?'active':''}" src="${esc(u)}" data-src="${esc(u)}" alt="손 네일 사진 ${i+1}">`).join('')}</div></div><div class="hand-note">매장별로 서로 다른 손·네일 대표 이미지를 배정했습니다.</div>` : ''}
      <div class="info-list">
        <div class="info-row"><div class="label">📍 주소</div><div class="value">${esc(address || '지도 좌표로 위치를 확인할 수 있습니다.')}</div></div>
        ${distanceMatch ? `<div class="info-row"><div class="label">📏 가까운 거리</div><div class="value"><strong>${esc(distanceMatch[1])}</strong></div></div>` : ''}
        <div class="info-row"><div class="label">⌖ 위도/경도</div><div class="value coord">${ll.lat.toFixed(6)}, ${ll.lng.toFixed(6)}</div></div>
      </div>
      <div class="panel-actions">
        <button class="panel-btn btn-focus" id="panel-focus-btn">📍 지도에서 이 자리 보기</button>
        <a class="panel-btn btn-kakao" href="${kakao}" target="_blank" rel="noopener">💬 카카오맵 길찾기</a>
        <a class="panel-btn btn-naver" href="${naver}" target="_blank" rel="noopener">N 네이버 지도 검색</a>
        <a class="panel-btn btn-google" href="${google}" target="_blank" rel="noopener">G 구글 지도 길찾기</a>
      </div>
      <div class="panel-note">※ 손사진은 매장 구분을 위한 대표 이미지이며 실제 매장 사진과 다를 수 있습니다.</div>`;
    panel.querySelectorAll('.gallery-thumb').forEach(function(thumb){ thumb.addEventListener('click', function(){ const main=panel.querySelector('#gallery-main'); if(main) main.src=this.dataset.src; panel.querySelectorAll('.gallery-thumb').forEach(t=>t.classList.remove('active')); this.classList.add('active'); }); });
    document.getElementById('panel-focus-btn').onclick = function() {
      map_7742d26e673cfcef89b64b6c3107503a.setView(ll, 18, {animate:true});
      marker.openPopup();
    };
  }
  function bindMarkers() {
    const map = map_7742d26e673cfcef89b64b6c3107503a;
    initMiniMap();
    const closer=document.getElementById('panel-close'); if(closer) closer.addEventListener('click', function(){ document.getElementById('panel-content').innerHTML='<div class="panel-empty">지도에서 아파트 또는 네일숍 마커를 선택해주세요.</div>'; });
    map.eachLayer(function(layer) {
      if (layer instanceof L.Marker) {
        layer.on('click', function() { showPlace(layer); });
      }
    });
    setTimeout(function() { map.invalidateSize(); }, 200);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', function() { setTimeout(bindMarkers, 400); });
  else setTimeout(bindMarkers, 400);
})();
</script>
